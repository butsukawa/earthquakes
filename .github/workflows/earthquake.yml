name: Earthquake Monitor Loop

on:
  schedule:
    # 6時間おきに起動 (UTC時間で 0:00, 6:00, 12:00, 18:00 -> 日本時間 9:00, 15:00, 21:00, 3:00)
    # cronの起動自体はズレますが、起動した後はPython側が正確に5分間隔で5時間50分動き続けます。
    - cron: '0 */6 * * *'
  workflow_dispatch: # 手動実行用ボタンも設置

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # GitHubの最大実行時間である6時間(360分)に設定

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run Monitor Loop
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: |
        python earthquake_bot.py # ★実際のPythonファイル名に書き換えてください

    - name: Commit and Push Status File
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        # 最後に通知した地震ID(last_earthquake.txt)に変更があればリポジトリに保存する
        if [ -f last_earthquake.txt ]; then
          git add last_earthquake.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update last earthquake status [skip ci]" && git push)
        fi
